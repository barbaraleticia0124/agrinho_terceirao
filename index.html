<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroCrédito Verde | Simulador de Financiamento Sustentável</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>AgroCrédito Verde</h1>
        <p>Transformando práticas sustentáveis em taxas de juros reduzidas</p>
    </header>

    <div class="container">
        <div class="card">
            <form id="simulador-form" onsubmit="calcularCredito(event)">
                
                <div class="form-group">
                    <label for="nome">Nome do Produtor / Propriedade</label>
                    <input type="text" id="nome" required placeholder="Ex: Fazenda Santa Maria">
                </div>

                <div class="form-group">
                    <label for="valor">Valor do Crédito Solicitado (R$)</label>
                    <input type="number" id="valor" required placeholder="Ex: 500000" min="10000">
                </div>

                <div class="form-group">
                    <label>Possui área de preservação (APP/Reserva Legal) regularizada?</label>
                    <div class="radio-group">
                        <div class="radio-option" onclick="selectRadio(this, 'app', 30)">
                            <input type="radio" name="app" value="sim" required> Sim, 100% em conformidade
                        </div>
                        <div class="radio-option" onclick="selectRadio(this, 'app', 0)">
                            <input type="radio" name="app" value="nao"> Em processo / Não
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Qual sistema de cultivo principal utilizado?</label>
                    <select id="cultivo" required onchange="atualizarScore()">
                        <option value="">Selecione uma opção</option>
                        <option value="40">Integração Lavoura-Pecuária-Floresta (ILPF) (+40 Pts)</option>
                        <option value="30">Plantio Direto na Palha (+30 Pts)</option>
                        <option value="15">Cultivo Convencional com rotação de culturas (+15 Pts)</option>
                        <option value="0">Cultivo Convencional Padrão (0 Pts)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Utiliza Bioinsumos ou Defensivos Biológicos?</label>
                    <div class="radio-group">
                        <div class="radio-option" onclick="selectRadio(this, 'bio', 30)">
                            <input type="radio" name="bio" value="sim" required> Sim, em mais de 50% da área
                        </div>
                        <div class="radio-option" onclick="selectRadio(this, 'bio', 0)">
                            <input type="radio" name="bio" value="nao"> Uso mínimo ou Não utiliza
                        </div>
                    </div>
                </div>

                <button type="submit">Simular Taxas e Crédito</button>
            </form>

            <div id="result-section">
                <div class="score-box">
                    <h3>Seu Score Agro Ambiental</h3>
                    <div class="score-value" id="score-display">0</div>
                    <div id="status-badge" class="status-badge">Analisando...</div>
                </div>

                <div class="form-group">
                    <p><strong>Resultado da Análise:</strong></p>
                    <p id="analise-texto"></p>
                </div>

                <div class="partner-banks" id="banks-section">
                    <p><strong>Fundos Verdes e Bancos Parceiros Recomendados:</strong></p>
                    <div class="bank-list" id="bank-list">
                        </div>
                </div>

                <button class="btn-print" onclick="window.print()">Imprimir Relatório Oficial (PDF)</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
